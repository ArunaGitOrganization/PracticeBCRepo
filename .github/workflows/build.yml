name: Build BC App

on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install BcContainerHelper
        shell: powershell
        run: |
          Install-Module BcContainerHelper -Force -AllowClobber

      - name: Create BC Container and Build
        shell: powershell
        run: |
          $artifactUrl = Get-BCArtifactUrl -type Sandbox -country us -select Latest

          $credential = New-Object PSCredential 'admin',(ConvertTo-SecureString 'P@ssword1' -AsPlainText -Force)

          # ✅ CRITICAL FIX: Convert path for Docker
          $workspace = (Get-Location).Path -replace '\\','/'
          Write-Host "Workspace path: $workspace"

          # Create container with correct volume mapping
          New-BcContainer `
            -accept_eula `
            -containerName bccontainer `
            -artifactUrl $artifactUrl `
            -auth UserPassword `
            -credential $credential `
            -updateHosts `
            -useBestContainerOS `
            -includeAL `
            -additionalParameters @("--volume ${workspace}:/src")

          # Compile AL project
          Compile-AppInBCContainer `
            -containerName bccontainer `
            -appProjectFolder "/src" `
            -appOutputFolder "/src/output" `
            -credential $credential

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BC-App
          path: output

      - name: Remove Container
        if: always()
        shell: powershell
        run: |
          Remove-BcContainer -containerName bccontainer