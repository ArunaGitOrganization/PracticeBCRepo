name: Build BC App

on:
  push:
    branches:
      - master
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install BcContainerHelper
        shell: powershell
        run: |
          Install-Module BcContainerHelper -Force -AllowClobber

      - name: Create Container and Build
        shell: powershell
        run: |
          $artifactUrl = Get-BCArtifactUrl -type Sandbox -country us -select Latest

          $credential = New-Object pscredential 'admin',(ConvertTo-SecureString 'P@ssw0rd' -AsPlainText -Force)

          # ✅ FIX: Use actual working directory (NOT env variable)
          $workspace = (Get-Location).Path
          Write-Host "Workspace path: $workspace"

          # Create BC Container with correct volume mapping
          New-BcContainer `
            -accept_eula `
            -containerName bcbuild `
            -artifactUrl $artifactUrl `
            -auth UserPassword `
            -Credential $credential `
            -updateHosts `
            -includeAL `
            -additionalParameters @("--volume ${workspace}:c:\src")

          # Compile AL App
          Compile-AppInBCContainer `
            -containerName bcbuild `
            -appProjectFolder "c:\src" `
            -appOutputFolder "c:\src\output" `
            -credential $credential

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BC-App
          path: output

      - name: Remove Container
        if: always()
        shell: powershell
        run: |
          Remove-BcContainer -containerName bcbuild